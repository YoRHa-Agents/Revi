<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .title { font-family: Georgia, 'Times New Roman', serif; font-size: 64px; font-weight: 400; letter-spacing: 0.3em; fill: #454138; }
      .subtitle { font-family: Georgia, 'Times New Roman', serif; font-size: 16px; font-weight: 400; letter-spacing: 0.25em; fill: #7A7668; }
      .tagline { font-family: Georgia, 'Times New Roman', serif; font-size: 13px; font-weight: 400; letter-spacing: 0.12em; fill: #9E9A8D; font-style: italic; }
      .line { stroke: #9E9A8D; stroke-width: 0.75; }
      .line-thin { stroke: #BAB5A1; stroke-width: 0.5; }
      .dot { fill: #9E9A8D; }
    </style>
  </defs>
  <line class="line" x1="120" y1="28" x2="680" y2="28"/>
  <line class="line-thin" x1="160" y1="33" x2="640" y2="33"/>
  <circle class="dot" cx="120" cy="28" r="2"/>
  <circle class="dot" cx="680" cy="28" r="2"/>
  <circle class="dot" cx="160" cy="33" r="2"/>
  <circle class="dot" cx="640" cy="33" r="2"/>
  <text class="title" x="400" y="105" text-anchor="middle">R E V I</text>
  <text class="subtitle" x="400" y="135" text-anchor="middle">YoRHa Review Division</text>
  <text class="tagline" x="400" y="160" text-anchor="middle">Humans review. Agents revise.</text>
  <line class="line-thin" x1="160" y1="172" x2="640" y2="172"/>
  <line class="line" x1="120" y1="177" x2="680" y2="177"/>
  <circle class="dot" cx="160" cy="172" r="2"/>
  <circle class="dot" cx="640" cy="172" r="2"/>
  <circle class="dot" cx="120" cy="177" r="2"/>
  <circle class="dot" cx="680" cy="177" r="2"/>
</svg>
