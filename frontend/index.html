<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Revi — YoRHa Review Division</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg:          #DAD4BB;
        --bg-alt:      #D0C9AE;
        --bg-sidebar:  #D4CDB7;
        --bg-card:     #E2DCCA;
        --bg-input:    #CEC7AC;
        --bg-dark:     #2A2822;
        --border:      #9E9A8D;
        --border-light: #BAB5A1;
        --text:        #454138;
        --text-dim:    #5f5c51;
        --text-faint:  #6a675e;
        --accent:      #954321;
        --accent-soft: rgba(149,67,33,0.08);
        --accent-med:  rgba(149,67,33,0.15);
        --green:       #486242;
        --green-soft:  rgba(72,98,66,0.1);
        --amber:       #665a25;
        --amber-soft:  rgba(102,90,37,0.1);
        --serif:       'EB Garamond', Georgia, 'Times New Roman', serif;
        --mono:        'JetBrains Mono', Consolas, monospace;
      }
      body {
        font-family: var(--serif);
        background: var(--bg);
        color: var(--text);
      }
      ::selection { background: rgba(194,87,43,0.2); }
      #app::after {
        content: '';
        position: fixed; inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg width='4' height='4' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='1' height='1' fill='%23000' fill-opacity='0.015'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
